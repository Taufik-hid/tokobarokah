<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cek Harga Barang</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
padding:15px;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

input,button{
width:100%;
height:48px;
font-size:16px;
margin-top:8px;
margin-bottom:10px;
padding:10px;
}

button{
cursor:pointer;
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
}

.qty-box button{
width:60px;
}

.qty-display{
flex:1;
text-align:center;
font-size:20px;
font-weight:bold;
}

#reader{
display:none;
}

.suggestion{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
background:#fff;
}

.suggestion:hover{
background:#eee;
}

#suggestions{
border:1px solid #ddd;
border-radius:5px;
display:none;
max-height:200px;
overflow:auto;
}

.bill-item{
padding:10px 0;
border-bottom:1px solid #ddd;
}

.total{
font-size:22px;
font-weight:bold;
text-align:right;
}

.hidden{
display:none;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>Cek Harga Barang</h2>

<button onclick="startScanner()">
Scan Barcode
</button>

<div id="reader"></div>

<input
id="idProduk"
placeholder="ID Produk"
onchange="searchById()">

<input
id="namaProduk"
placeholder="Nama Produk"
onkeyup="searchProductName()">

<div id="suggestions"></div>

<input
id="hargaProduk"
readonly
placeholder="Harga">

<input
id="satuanProduk"
readonly
placeholder="Satuan">

<div class="qty-box">

<button onclick="minusQty()">
-
</button>

<div
id="qtyDisplay"
class="qty-display">
1
</div>

<button onclick="plusQty()">
+
</button>

</div>

<button onclick="saveBill()">
Simpan
</button>

</div>

<div class="card">

<h3>Detail Bill</h3>

<div id="billContainer">

Belum ada item

</div>

</div>

<div class="card">

<div class="total">
TOTAL: Rp <span id="totalHarga">0</span>
</div>

</div>

<button
id="resetBtn"
class="hidden"
onclick="resetBill()">

Reset

</button>

<button onclick="goAdmin()">
Login Admin
</button>

</div>

<script src="app.js"></script>

</body>
</html>
