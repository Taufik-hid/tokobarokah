<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Produk</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
padding:15px;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
height:48px;
margin-top:8px;
margin-bottom:10px;
padding:10px;
font-size:16px;
}

button{
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:8px;
border:1px solid #ddd;
}

.action-btn{
width:auto;
height:auto;
padding:6px 10px;
margin:2px;
}

#reader{
width:100%;
display:none;
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>Admin Produk</h2>

<button onclick="startScanner()">
Scan Barcode
</button>

<div id="reader"></div>

<input
id="idProduk"
placeholder="ID Produk">

<input
id="namaProduk"
placeholder="Nama Produk">

<input
id="hargaProduk"
type="number"
placeholder="Harga">

<select id="satuanProduk">
<option>PCS</option>
<option>BOTOL</option>
<option>PACK</option>
<option>DUS</option>
<option>KG</option>
</select>

<button onclick="saveProduct()">
Simpan Produk
</button>

</div>

<div class="card">

<input
id="searchInput"
placeholder="Cari produk..."
onkeyup="renderProducts()">

</div>

<div class="card">

<table>

<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>Harga</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="productTable">
</tbody>

</table>

</div>

</div>

<script src="admin.js"></script>

</body>
</html>
